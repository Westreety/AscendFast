#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-STRUCTURED-FEEDBACK"
title = "Structured failure feedback"
kind = "normative"
status = "active"

[content]
text = """
When the forward gate fails, the apply stage MUST capture structured failure information and return it to the repair loop. The structured feedback MUST include:

1. The complete exception traceback (type, message, and stack frames).
2. An error category classification from the set: {env, op-param, graph, correctness, oom, conflict, unknown}.
3. The workspace state snapshot: which files were modified in the current round, the current change_log length, and the forward gate input (prompt tokens and device).

The forward gate MUST NOT silently swallow exceptions with only a print statement as it does in the current implementation. Instead, it MUST return a structured failure result that the repair loop can parse and route.

The error category classification MAY be performed by a triage specialist ([[RFC-0002:C-SPECIALIST-DISPATCH]]) rather than hardcoded heuristics, but the feedback structure itself is normative.

This clause exists because unstructured failure (a bare print followed by record=None) prevents the agent from understanding what went wrong and applying targeted fixes."""
