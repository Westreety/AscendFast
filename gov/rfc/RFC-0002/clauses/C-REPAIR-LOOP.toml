#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-REPAIR-LOOP"
title = "Bounded repair loop"
kind = "normative"
status = "active"

[content]
text = """
The apply stage MUST support a bounded repair loop with a configurable maximum round count (default 3). After apply-agent produces an initial implementation, the forward gate ([[RFC-0001:C-RUNNABLE]]) MUST run. If the gate fails, the apply stage MUST capture structured failure feedback ([[RFC-0002:C-STRUCTURED-FEEDBACK]]), feed it back to apply-agent, and allow the agent to dispatch a specialist subagent ([[RFC-0002:C-SPECIALIST-DISPATCH]]) to repair the workspace. This loop MUST repeat until either the forward gate passes or the maximum round count is exhausted.

The round count MUST be configurable via apply stage parameters. Each round MUST be independently logged with its failure category, specialist invoked, and outcome. The loop MUST NOT continue past the configured maximum, even if the agent requests additional attempts.

This clause ensures that transient fixable failures (environment issues, operator parameter errors, graph API mismatches) do not result in immediate strategy rejection when repair is possible within a bounded token and time budget."""
