#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-SUMMARY"
title = "Summary"
kind = "informative"
status = "active"

[content]
text = """
The apply stage accepts an OptimizationStrategy, forks the base ExecutionMode workspace, and invokes apply-agent to write the code that implements the strategy. The current apply runs a single forward-gate probe after the agent returns; if the probe fails, the agent never sees the error and the entire strategy is discarded. Environment issues (missing dependencies), operator parameter errors (dtype/layout mismatches), graph compilation failures, and change-log conflicts all result in silent one-shot failure with no repair opportunity.

This RFC specifies an iterative repair protocol: apply-agent becomes a repair orchestrator that runs a bounded retry loop (default max 3 rounds), dispatches specialist subagents to fix classified failures (environment, kernel/fusion, graph, dtype/layout, bisect), and only reports record=None after exhausting the budget. The forward gate returns structured feedback (traceback + error category) to the loop, and every specialist modification is traced into ChangeRecord.metadata for by-agent attribution.

This contract exists because optimization failures often stem from fixable issues (a missing package, a wrong dtype annotation, a graph API change) rather than fundamental strategy invalidity. A repair loop with specialist dispatch turns transient failures into recoverable outcomes without violating the apply-stage HOW boundary — apply-agent still only implements the given strategy; it just gets multiple attempts with structured feedback."""
