#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-ENV-WHITELIST"
title = "Environment agent installation whitelist"
kind = "normative"
status = "active"

[content]
text = """
env-agent resolves environment and dependency failures, but environment changes are global to the shared project virtualenv and therefore violate the workspace-isolation model ([[RFC-0001:C-ISOLATION]]): one bad install pollutes every ExecutionMode, not just the current fork. To bound this risk:

1. env-agent MAY autonomously install packages that are on a pre-approved whitelist (recorded in gov/config.toml or an equivalent project config). The whitelist is for low-risk, pure-Python patch packages that supply missing standard tooling (for example: setuptools, which provides pkg_resources).
2. Any environment change OUTSIDE the whitelist — a new heavy dependency, a version change to a pinned package, a CANN-level or driver-level change — MUST be escalated rather than performed silently. env-agent MUST report the diagnosis and the proposed fix, and the repair round MUST terminate with an escalation ([[RFC-0002:C-EXHAUSTION]]).
3. env-agent MUST respect the version pins in pyproject.toml. It MUST NOT change a pinned version (notably torch, torch-npu, transformers) even within the whitelist.
4. Every whitelisted install MUST be recorded loudly and auditably in ChangeRecord.metadata ([[RFC-0002:C-ATTRIBUTION]]): the package name and the exact version installed.

This clause exists because environment autonomy trades isolation safety for convenience. A whitelist gives the common, harmless patches (a missing pkg_resources) automatically, while keeping dangerous or cross-mode-affecting changes under explicit human review — consistent with the project's no-silent-invention rule."""
