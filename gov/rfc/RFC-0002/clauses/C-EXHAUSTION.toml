#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-EXHAUSTION"
title = "Exhaustion and loud failure"
kind = "normative"
status = "active"

[content]
text = """
When the repair loop exhausts its maximum round count ([[RFC-0002:C-REPAIR-LOOP]]) without a passing forward gate, the apply stage MUST report record=None — loud-failure semantics. It MUST NOT fabricate a ChangeRecord over a workspace that never passed the forward gate, and MUST NOT silently degrade a failed repair into an apparent success.

A record=None outcome MUST cause the apply-effectiveness gate to judge the apply ineffective: the pipeline neither enters correctness (no correctness_passed=null artifact) nor recurses into the broken mode, exactly as in the single-shot case.

The exhausted-loop outcome MUST be distinguishable in the RunLedger from a first-shot failure: the per-round repair log ([[RFC-0002:C-ATTRIBUTION]]) MUST record that the maximum was reached and the last failure category, so a reader can see the strategy was attempted-and-repaired-and-still-failed rather than never-attempted.

Additionally, when env-agent encounters a non-whitelisted environment change ([[RFC-0002:C-ENV-WHITELIST]]), the loop MUST terminate that round with an escalation rather than continuing to burn repair rounds on an unfixable-without-permission failure.

This clause preserves the no-silent-fallback principle: adding a repair loop must not create a new way for a broken mode to look successful."""
