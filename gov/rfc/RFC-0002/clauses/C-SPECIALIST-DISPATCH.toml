#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-SPECIALIST-DISPATCH"
title = "Specialist subagent dispatch"
kind = "normative"
status = "active"

[content]
text = """
apply-agent acts as a repair orchestrator. When the forward gate fails, apply-agent MAY dispatch one or more specialist subagents to repair the workspace. The v1 specialist set is:

- triage-agent: classifies the structured failure into an error category and routes to the appropriate specialist. MUST NOT itself modify the workspace.
- kernel-agent: writes or wires high-performance NPU operators, including fused ops (torch_npu.npu_* and custom kernels). MUST guard every fused-op use with hasattr() per the project op-availability rule.
- graph-agent: handles computation-graph optimization — torch.compile / torchair graph mode, static shapes, graph rewrites.
- env-agent: diagnoses and resolves environment / dependency / CANN failures, subject to the installation whitelist ([[RFC-0002:C-ENV-WHITELIST]]).
- dtype-layout-agent: repairs NPU dtype mismatches and ND/NZ layout errors — the most frequent forward-time crash mode.
- bisect-agent: when optimizations are stacked ([[RFC-0001:C-STACKING]]), locates which change_log layer conflicts with the current change.

Each specialist MUST stay within the apply-stage HOW boundary: specialists implement and repair, they MUST NOT invent new optimization strategies. The orchestrator and its specialists collectively still constitute the apply (HOW) stage; the dispatch is an internal decomposition, not a blurring of the WHAT/WHY versus HOW separation.

A specialist MUST NOT edit hardlinked weight files in place ([[RFC-0001:C-WEIGHTS]]) and MUST keep build_model() loadable after its repair ([[RFC-0001:C-SMOKE]])."""
