#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-ATTRIBUTION"
title = "Specialist attribution in ChangeRecord"
kind = "normative"
status = "active"

[content]
text = """
Every specialist repair MUST be traced into the accepted ChangeRecord so that by-lever and by-agent attribution remains meaningful. The ChangeRecord.metadata MUST record, for the round that ultimately produced a passing forward gate:

1. The repair rounds taken (an integer, 1 if no repair was needed).
2. For each round: the failure category, the specialist invoked, and a one-line summary of the fix.
3. Any environment change made by env-agent ([[RFC-0002:C-ENV-WHITELIST]]), recorded as a loud, auditable entry (package name and version installed).

This trace MUST allow a reader of the RunLedger to answer: did this optimization succeed on the first attempt, or did it require repair, and which specialist fixed it. A ChangeRecord that passed only after specialist repair is still a valid effective ChangeRecord ([[RFC-0001:C-RUNNABLE]]); the repair history is metadata, not a disqualifier.

This clause exists because dispatching specialists inside apply would otherwise blur which agent did what, defeating the staged attribution the pipeline relies on."""
