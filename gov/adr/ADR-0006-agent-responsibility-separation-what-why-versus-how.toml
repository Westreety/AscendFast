#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0006"
title = "Agent responsibility separation: WHAT/WHY versus HOW"
status = "accepted"
date = "2026-06-14"
refs = ["ADR-0005"]

[content]
context = """
The pipeline delegates four cognitive jobs to LLM agents: diagnose the profile, propose
strategies, implement them, and (implicitly) report what was done. If these blur — if
the diagnosis agent also proposes fixes, or the strategy agent writes code, or the apply
agent invents its own strategies — the system loses the ability to attribute outcomes
and to reason about WHERE a bad result came from. A strategy that fails could be a bad
diagnosis, a bad strategy, or a bad implementation, and a blurred pipeline cannot tell
them apart.

This ADR records the chosen state, reconstructed from the agent role table in CLAUDE.md,
analysis.py:236-257, and strategy.py:104-125."""
decision = """
The four agents have strictly separated responsibilities, split along WHAT/WHY versus HOW:

- profile-agent: run the profiler, return report path + measured latency. Does NOT
  interpret results.
- analysis-agent: find WHERE time is spent. States objective findings only (which op
  types dominate, compute- vs memory-bound, fragmentation, measurement reliability).
  MUST NOT propose fixes.
- strategy-agent: propose WHAT to optimize and WHY, naming one lever per candidate.
  MUST NOT write code or pin down the HOW.
- apply-agent: write the code and verify it (the HOW). MUST NOT invent strategies.

Each agent's prompt enforces its boundary (e.g. analysis: "Do NOT propose fixes or say
how to optimize"; strategy: "your job is WHAT/WHY, the apply agent does the HOW"). This
separation is what makes staged attribution and by-lever reconciliation ([[ADR-0005]])
meaningful."""
consequences = """
### Positive
- A failed optimization localizes to a specific stage (diagnosis / strategy / apply).
- Focused prompts are easier to constrain and audit.
- Enables by-lever attribution: strategy-wanted vs apply-applied.

### Negative
- More agent round-trips per node (separate calls instead of one).
- Boundaries live in prompt text and must be maintained as prompts evolve.

### Neutral
- The boundaries are also encoded in the project's subagent definitions under
  .claude/agents and the role table in CLAUDE.md."""

[[content.alternatives]]
text = "Chosen: strict separation along WHAT/WHY vs HOW. profile-agent runs the profiler and returns paths+latency (does not interpret). analysis-agent finds WHERE time goes, stating objective findings only, explicitly forbidden from proposing fixes. strategy-agent proposes WHAT to optimize and WHY (picks a lever), forbidden from writing code or pinning the HOW. apply-agent writes the code and verifies (the HOW), forbidden from inventing strategies. Each agent's prompt enforces its boundary."
status = "accepted"
pros = [
    "Outcomes are attributable: a failure localizes to diagnosis, strategy, or implementation",
    "Each agent prompt is focused and harder to derail",
    "By-lever attribution ([[ADR-0005]]) is meaningful precisely because strategy and apply are separate roles",
]

[[content.alternatives]]
text = "Rejected: a single end-to-end agent that profiles, decides, and implements in one shot."
status = "rejected"
cons = [
    "No way to attribute a bad outcome to a specific stage",
    "One large prompt is easier to derail and harder to constrain",
]
rejection_reason = "Collapsing the roles destroys attributability — the whole point of the staged ledger is to localize why an optimization did or didn't work."
