#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0010"
title = "Env-agent safe installation whitelist"
status = "proposed"
date = "2026-06-16"
refs = [
    "RFC-0002",
    "RFC-0001",
    "ADR-0009",
]

[content]
context = """
[[ADR-0009]] introduces env-agent, a specialist that resolves environment / dependency
failures during apply repair. But environment changes are fundamentally different from
every other repair: a kernel, graph, or dtype fix edits files INSIDE the forked workspace
and is isolated to that mode ([[RFC-0001:C-ISOLATION]]). An environment change — uv pip
install, a CANN config edit — mutates the SHARED project virtualenv, which is global to
every ExecutionMode in the project. One bad or version-conflicting install pollutes every
mode and every sibling fork at once.

This collides head-on with the project's isolation model. The concrete trigger is real:
torchair (bundled inside torch_npu) fails to import because pkg_resources / setuptools is
missing from the venv — a one-package, harmless fix. But "let the agent install whatever
it thinks it needs" would also permit it to bump torch / torch-npu / transformers, whose
versions are deliberately pinned in pyproject.toml to match the installed CANN. The
question is how much environment autonomy env-agent gets without breaking isolation or the
pinned runtime."""
decision = """
env-agent gets whitelisted autonomy ([[RFC-0002:C-ENV-WHITELIST]]):

1. It MAY autonomously install packages on a pre-approved whitelist recorded in
   gov/config.toml (or equivalent project config). The whitelist holds low-risk,
   pure-Python tooling that supplies missing standard machinery — setuptools (for
   pkg_resources) is the seed entry.
2. Any change OUTSIDE the whitelist — a new heavy dependency, a version bump to a pinned
   package, a CANN- or driver-level change — MUST escalate: env-agent reports the
   diagnosis and proposed fix, and the repair round terminates with an escalation
   ([[RFC-0002:C-EXHAUSTION]]) rather than installing silently.
3. env-agent MUST respect pyproject.toml pins. It MUST NOT change a pinned version
   (notably torch, torch-npu, transformers) even if that package name were whitelisted.
4. Every whitelisted install is recorded loudly and auditably in ChangeRecord.metadata
   ([[RFC-0002:C-ATTRIBUTION]]): package name and the exact installed version.

This bounds the blast radius of the one repair class that escapes workspace isolation
([[RFC-0001:C-ISOLATION]]): the common harmless patches are automatic, while anything that
could poison the shared venv across modes stays behind an explicit human gate."""
consequences = """
### Positive
- The most common, harmless environment failure (a missing setuptools/pkg_resources
  blocking torchair) is fixed automatically without stalling the repair loop on a human.
- The pinned runtime (torch / torch-npu / transformers matched to CANN) is protected: no
  agent action can silently bump it.
- Cross-mode contamination risk is bounded — only pre-vetted packages can land in the
  shared venv autonomously; everything riskier is gated.
- Every environment mutation is auditable in the ledger.

### Negative
- The whitelist is a maintained artifact: someone must vet and extend it, and a too-narrow
  whitelist will escalate fixes that are actually safe, adding human turnaround.
- A package can be pure-Python and whitelisted yet still pull transitive dependencies; the
  whitelist must be read as "this install, with its resolved deps" and reviewed accordingly.

### Neutral
- The whitelist lives in gov/config.toml (or equivalent) and is therefore itself under
  governance review.
- This ADR refines, but does not weaken, [[RFC-0001:C-ISOLATION]]: it carves out a narrow,
  explicitly-bounded exception for global environment state rather than pretending env
  changes can be workspace-local."""

[[content.alternatives]]
text = "Whitelisted autonomy: env-agent may autonomously install only packages on a pre-approved whitelist (low-risk pure-Python tooling such as setuptools); any change outside the whitelist — new heavy dependency, version bump to a pinned package, CANN/driver change — must escalate and terminate the repair round. Pinned versions in pyproject.toml are never changed even within the whitelist. Every whitelisted install is recorded loudly in ChangeRecord.metadata."
status = "accepted"

[[content.alternatives]]
text = "Diagnose-only: env-agent never installs anything; it only diagnoses and reports the proposed fix for a human to apply."
status = "rejected"
rejection_reason = "Too conservative: even a trivial, universally-safe fix like a missing setuptools would block the entire repair loop on human turnaround, defeating the point of automated repair for the most common, harmless class of environment failure."

[[content.alternatives]]
text = "Unrestricted autonomy with logging: env-agent installs whatever it judges necessary, recording each change in the ledger."
status = "rejected"
rejection_reason = "Violates the no-silent-invention rule and the isolation model: a single agent-chosen install can bump a pinned torch/torch-npu/transformers version or pull a heavy conflicting dependency, silently corrupting every mode in the shared venv with no human gate. Logging after the fact does not undo a poisoned environment."
