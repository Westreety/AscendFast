#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0009"
title = "Apply-agent as repair orchestrator with specialist dispatch"
status = "proposed"
date = "2026-06-16"
refs = [
    "RFC-0002",
    "ADR-0006",
    "ADR-0008",
    "ADR-0010",
]

[content]
context = """
The apply stage (apply.py:62-105) currently calls apply-agent exactly once, runs one
forward-gate probe (_workspace_forward_ok, apply.py:112-156), and on any failure sets
record=None — discarding the entire strategy. The forward gate swallows the exception
with a bare print (apply.py:154-156); the agent never sees what went wrong and gets no
second attempt.

This is wasteful because apply failures are heterogeneous and often fixable:
- environment / dependency issues (a missing package, e.g. torchair failing because
  pkg_resources / setuptools is absent) — a real case observed in this project;
- operator parameter errors (dtype / ND-NZ layout mismatches on NPU fused ops) that only
  surface at forward time;
- graph compilation failures (torch.compile / torchair backend errors);
- change_log conflicts when optimizations stack ([[RFC-0001:C-STACKING]]).

A single bad result for any of these kills the whole strategy even when a targeted repair
would succeed. We want a bounded repair loop with feedback, but it must not collapse the
WHAT/WHY-versus-HOW separation ([[ADR-0006]]) nor the no-silent-fallback guarantee
([[ADR-0008]]). The question is who drives the loop and how repair work is decomposed."""
decision = """
apply-agent becomes a repair orchestrator. apply.py drives a bounded repair loop (default
max 3 rounds, configurable) per [[RFC-0002:C-REPAIR-LOOP]]:

1. apply-agent produces an initial implementation of the strategy.
2. The forward gate runs ([[ADR-0008]]). On failure it returns structured feedback —
   full traceback plus an error category from {env, op-param, graph, correctness, oom,
   conflict, unknown} — instead of swallowing the exception with a print
   ([[RFC-0002:C-STRUCTURED-FEEDBACK]]).
3. apply-agent dispatches a specialist subagent matched to the category
   ([[RFC-0002:C-SPECIALIST-DISPATCH]]): triage (classify/route), kernel (ops + fusion),
   graph (torch.compile/torchair), env (dependencies, whitelisted — [[ADR-0010]]),
   dtype-layout (dtype/ND-NZ), bisect (locate the conflicting stacked layer).
4. The specialist repairs the workspace and the loop re-probes.
5. On success, the repair history (rounds, categories, specialist, fix summary) is traced
   into ChangeRecord.metadata ([[RFC-0002:C-ATTRIBUTION]]).
6. On exhaustion, record=None — the same loud failure as [[ADR-0008]]
   ([[RFC-0002:C-EXHAUSTION]]).

The orchestrator and its specialists collectively remain the apply (HOW) stage: the
internal multi-agent decomposition does NOT blur the WHAT/WHY-versus-HOW boundary of
[[ADR-0006]]. Specialists implement and repair; they MUST NOT invent new strategies."""
consequences = """
### Positive
- Fixable failures (missing dependency, wrong dtype, graph API mismatch) become
  recoverable instead of killing the whole strategy on the first probe.
- Repair work is decomposed into focused, auditable specialists, each with a narrow prompt
  that is easier to constrain than one do-everything agent.
- By-agent attribution is preserved: ChangeRecord.metadata records which specialist fixed
  what, so a RunLedger reader can localize first-shot success vs repaired success.
- The loud-failure guarantee ([[ADR-0008]]) is preserved on exhaustion.

### Negative
- More agent round-trips per node: a failing apply may now invoke triage plus one or more
  specialists across up to 3 rounds, increasing token and wall-clock cost.
- Each repair round runs a fresh forward probe, paying NPU memory and forward cost per
  round.
- Orchestration logic and the specialist roster add implementation complexity to apply.py
  and to the .claude/agents definitions that must be maintained.

### Neutral
- The boundary of [[ADR-0006]] is reinterpreted, not broken: apply is now internally
  multi-agent, but the cluster as a whole is still strictly the HOW stage.
- The specialist roster (triage, kernel, graph, env, dtype-layout, bisect) is the v1 set;
  correctness-agent was considered and deferred, so forward-passing-but-divergent outputs
  are still discarded as before until a future revision adds that specialist."""

[[content.alternatives]]
text = "apply-agent as repair orchestrator with specialist dispatch: apply.py drives a bounded loop (default 3 rounds); on forward-gate failure the structured feedback goes back to apply-agent, which classifies the failure (triage) and dispatches a specialist subagent (kernel, graph, env, dtype-layout, bisect) to repair the workspace, then re-probes. Specialists stay within the HOW boundary; their repairs are traced into ChangeRecord.metadata. Exhaustion yields record=None (loud failure)."
status = "accepted"

[[content.alternatives]]
text = "apply.py hardcodes a fixed repair loop with deterministic heuristics: Python code inspects the traceback, decides the fix category, and re-prompts apply-agent with a canned hint per category — no specialist subagents."
status = "rejected"
rejection_reason = "Hardcoded heuristics cannot adapt to the open-ended space of NPU op/graph/env failures; the fix logic ossifies in Python and cannot use agent reasoning over a novel traceback. It also keeps all repair knowledge in one place rather than in focused, auditable specialist prompts."

[[content.alternatives]]
text = "single end-to-end apply-agent that self-repairs inside one turn: hand the agent a forward-smoke capability and let it loop internally until it passes, with apply.py only doing a final verification gate."
status = "rejected"
rejection_reason = "apply.py loses control of the loop bound and observability — rounds, categories, and per-specialist attribution become invisible, and the agent could mask a failure as success, weakening the [[ADR-0008]] no-silent-fallback guarantee. Internal self-looping also makes by-agent attribution ([[ADR-0006]]) impossible."
