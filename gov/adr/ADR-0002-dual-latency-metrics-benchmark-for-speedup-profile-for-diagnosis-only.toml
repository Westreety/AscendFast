#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0002"
title = "Dual latency metrics: benchmark for speedup, profile for diagnosis only"
status = "accepted"
date = "2026-06-14"
refs = ["ADR-0004"]

[content]
context = """
The pipeline needs two kinds of latency information that pull in opposite directions:
(1) a trustworthy end-to-end latency to judge whether a fork achieved the 2x speedup
target, and (2) a fine-grained per-kernel breakdown to diagnose WHERE time goes and
generate optimization strategies.

These cannot come from the same measurement. The torch_npu profiler's instrumentation
adds per-op overhead that pollutes wall-clock timing — a profiled run is systematically
slower and unrepresentative. Conversely, a bare timing loop yields no kernel breakdown.
Using profiler latency to judge speedup would compare optimized-vs-baseline under a
distorted clock.

This ADR records the chosen state, reconstructed from optimization.py:43-46 and
benchmark.py:1-22."""
decision = """
Latency is measured two ways, for two purposes, and they never cross.

- Speedup ruler: run_real_benchmark (benchmark.py) times forward on the REAL ShareGPT
  dataset with a bare warmup→sync→perf_counter→forward→sync loop. No profiler runs,
  because profiler instrumentation pollutes timing. Its mean latency is the ONLY number
  used to judge the 2x target.
- Diagnosis: run_profile (profile_npu.py) runs the torch_npu profiler on SIMULATED data
  to produce top_kernels / op_type_totals / roofline. This feeds analysis and strategy
  generation ONLY; it never participates in the speedup decision.

On Ascend NPU, forward() dispatches asynchronously, so both paths synchronize around
the timed region — otherwise they would measure dispatch time, not execution time."""
consequences = """
### Positive
- The 2x decision rests on an unpolluted, real-dataset clock.
- Diagnosis retains full kernel-level detail.

### Negative
- Two datasets and two measurement code paths to maintain.
- A model is loaded and run more than once per node (benchmark, then profile).

### Neutral
- The split mirrors the benchmark.py / correctness.py symmetry: benchmark measures how
  FAST, correctness measures how CORRECT, profile diagnoses WHERE — three distinct NPU
  evaluations over the same build_model() entrypoint (see [[ADR-0004]])."""

[[content.alternatives]]
text = "Chosen: two separate measurement paths with different datasets and purposes. run_real_benchmark uses the real ShareGPT dataset and a bare warmup→sync→time→sync loop (no profiler) to produce the speedup ruler. run_profile uses simulated data + torch_npu profiler purely for diagnosis (top_kernels, op_type_totals, roofline). The 2x decision uses ONLY benchmark latency; profile latency never participates in selection."
status = "accepted"
pros = [
    "Speedup judged on an unpolluted clock",
    "Diagnosis gets full kernel detail without contaminating the decision metric",
    "Real dataset for the metric that matters; cheap simulated data for diagnosis",
]

[[content.alternatives]]
text = "Rejected: single profiled run, derive both the speedup number and the kernel breakdown from it."
status = "rejected"
cons = [
    "Profiler instrumentation inflates wall-clock latency",
    "2x judgments would be made on a distorted, unrepresentative clock",
]
rejection_reason = "Profiler overhead makes its latency unfit as the speedup ruler; the two needs are genuinely in tension and must be measured separately."
