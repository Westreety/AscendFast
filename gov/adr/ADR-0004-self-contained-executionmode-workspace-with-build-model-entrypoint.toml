#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0004"
title = "Self-contained ExecutionMode workspace with build_model() entrypoint"
status = "accepted"
date = "2026-06-14"
refs = [
    "RFC-0001",
    "ADR-0005",
]

[content]
context = """
Optimizations are deeply heterogeneous: a forward_patch monkey-patches one module, an
operator_fusion flips a config flag, a graph_rewrite wraps the whole model in
torch.compile, a loading_time change rewrites weight layout. The evaluation stages
(correctness, benchmark, profile) must load and run an optimized model without knowing
which of these it embeds — otherwise every stage would grow a switch over optimization
types, and adding a new optimization kind would touch every consumer.

A second concern: forking a model variant must be cheap. Model weight files are large
(GBs); copying them per fork is prohibitive.

This ADR records the chosen state, reconstructed from models.py:104-122 and
apply.py:207-231."""
decision = """
An ExecutionMode is a self-contained, runnable workspace directory that exposes the
single contract build_model() -> (model, tokenizer). All evaluators load the model
ONLY through this entrypoint and remain blind to what optimization it embeds.

Forking (apply._fork_workspace / _mirror_tree) mirrors the parent's tree but hardlinks
large weight files (.safetensors/.bin/.pt/...) for zero-copy copy-on-write, and truly
copies code and config. Any weight mutation must write NEW files rather than edit a
hardlinked one, so the parent remains intact. The change_log accumulates every
modification from root to this node (append-only) and is injected into the next apply
agent so it can stack on top.

The build_model() contract is normative and is specified in [[RFC-0001]]."""
consequences = """
### Positive
- Evaluators are fully decoupled from optimization heterogeneity.
- Forks are cheap (hardlinked weights) and isolated (CoW semantics).
- New optimization kinds require no change to correctness/benchmark/profile.

### Negative
- Disk usage grows with the number of surviving forks (code/config copies, plus any
  new weight files written by weight-mutating optimizations).
- Agents must respect the "write new files, never edit hardlinked weights" rule, or
  they silently corrupt the parent.

### Neutral
- The entrypoint contract induces downstream rules (patch imports inside build_model(),
  mandatory smoke test) documented in CLAUDE.md and formalized in [[RFC-0001]]."""

[[content.alternatives]]
text = "Chosen: each ExecutionMode is a self-contained, runnable workspace directory forked from its parent, exposing a single uniform entrypoint build_model() -> (model, tokenizer). Every consumer (correctness/benchmark/profile) loads ONLY through this function and is blind to the embedded optimization. Forking mirrors the parent tree but HARDLINKS large weight files (copy-on-write: same inode, zero-copy) and truly copies code/config; mutating weights requires writing NEW files so the parent stays intact."
status = "accepted"
pros = [
    "Consumers are decoupled from optimization heterogeneity — no switch over kinds",
    "Adding a new optimization kind touches only apply, not the evaluators",
    "Hardlinked weights make forks near-free in disk and time",
]

[[content.alternatives]]
text = "Rejected: a single shared model object mutated in place, with consumers branching on optimization metadata."
status = "rejected"
cons = [
    "Every consumer needs a switch over optimization types",
    "No clean fork/rollback; parent and child share mutable state",
]
rejection_reason = "Couples every evaluator to the full set of optimization kinds and makes forking/rollback impossible; the uniform entrypoint + workspace fork is what keeps consumers optimization-agnostic."
