#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0007"
title = "Observability layer with stage outcomes and decision gates"
status = "accepted"
date = "2026-06-14"
refs = ["ADR-0008"]

[content]
context = """
The pipeline runs many fallible stages per node (benchmark, profile, analyze, strategy,
apply, correctness) across a recursion. Two failure modes hurt: (1) an exception in any
one stage would propagate and tear down the entire run, losing all the work in sibling
branches; (2) certain "soft" failures were silent — an empty strategy list made the
apply loop iterate zero times with no signal, and an apply that produced no real
ChangeRecord (agent failure) still recursed into a mode that "didn't really change",
later crashing on asdict(None).

There was no record of WHY a run stopped or which stage failed — the decision trail was
a black box.

This ADR records the chosen state, reconstructed from verify.py and models.py:42-73."""
decision = """
Observability is a thin layer over two entities — StageOutcome and RunLedger — that
invents no new observation concepts:

1. stage(ledger, name, mode_uid): a context manager that runs a stage body, records
   exactly one StageOutcome, and SWALLOWS any exception (recorded as ok=False,
   reason="<ExcType>: ..."). Callers branch on outcome.ok instead of catching. A single
   stage failure never tears down the run.
2. gate_*(): pure functions feeding stage outcomes. gate_strategy rejects an empty
   strategy list (no more silent zero-iteration loop); gate_apply rejects an apply that
   added no real ChangeRecord (root cause of the None-record bug). They never touch
   agents and never raise.
3. RunLedger: persists the full decision trail — stop_reason
   (reached_2x|max_depth|no_strategies|exhausted|stage_failed:<stage>), every
   StageOutcome, by-lever attribution metadata — to runs/<run>.json.

The ledger is deterministic and offline; it never depends on agents. agent_call is just
one StageOutcome kind, recorded for diagnosis, never participating in decisions."""
consequences = """
### Positive
- One stage's failure is contained; the run continues and records why.
- Soft failures (empty strategies, None ChangeRecord) are explicit gated stops.
- Every run leaves an auditable, deterministic, offline decision trail in runs/.

### Negative
- Swallowing all exceptions in stage() can mask programming errors as "stage failures";
  the reason string is the only breadcrumb.
- Every stage call site must remember to check outcome.ok and branch.

### Neutral
- ChangeRecord and StageOutcome are intentionally isomorphic self-describing records:
  one for "what optimization", one for "what stage outcome"."""

[[content.alternatives]]
text = "Chosen: a thin observability layer over two entities (StageOutcome, RunLedger) that invents no new concepts. stage() is a context manager that runs a stage body, records one StageOutcome, and SWALLOWS exceptions (recorded as ok=False with the exception text) so a single failure never tears down the run. gate_*() are pure functions (gate_strategy: empty list stops the run; gate_apply: no real ChangeRecord means do not recurse). RunLedger persists the whole decision trail (stop_reason, per-stage outcomes, by-lever metadata) to runs/. Deterministic and offline — the ledger never depends on agents; agent_call is just one outcome kind."
status = "accepted"
pros = [
    "A single stage failure no longer tears down the whole run",
    "Previously-silent soft failures (empty strategies, None ChangeRecord) become explicit gated stops",
    "The decision trail (why it stopped, what failed) is persisted and auditable, deterministic and offline",
]

[[content.alternatives]]
text = "Rejected: let exceptions propagate and add ad-hoc try/except patches where crashes are observed."
status = "rejected"
cons = [
    "Each crash is patched reactively; soft failures stay silent",
    "No uniform record of stage outcomes or stop reasons",
]
rejection_reason = "Reactive patching never yields the auditable decision trail; converging every stage's pass/fail into one StageOutcome + ledger is what makes 'why did this run do that' answerable."
