#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0005"
title = "Four canonical optimization levers as single source of truth"
status = "accepted"
date = "2026-06-14"
refs = ["ADR-0006"]

[content]
context = """
Three modules must agree on the vocabulary of "what kind of optimization is this":
strategy picks a lever, apply records the kind it actually landed, and the RunLedger
attributes outcomes by-lever (strategy-wanted vs apply-applied). If each module
hardcoded its own kind strings, they would drift — strategy emits "kvcache", apply
records "static_cache", the ledger can't reconcile them — and the by-lever attribution
that exposes strategy↔apply divergence would be meaningless.

There was also conceptual confusion about what counts as a top-level lever: kvcache,
quantize, config, and parallelism look like peers but are not.

This ADR records the chosen state, reconstructed from models.py:5-20."""
decision = """
The optimization lever vocabulary is a single source of truth: LEVER_KINDS =
(forward_patch, operator_fusion, graph_rewrite, loading_time) defined once in models.py,
corresponding to the four layers at which build_model can be changed:

- forward_patch   — monkey-patch one nn.Module.forward (narrowest, single op)
- operator_fusion — flip a config flag / attn_implementation to a fused backend
- graph_rewrite   — wrap the whole model (torch.compile / NPU graph mode)
- loading_time    — one-off at load (weight ND→NZ, dtype cleanup, static KV cache, padding)

apply's legal set extends this with a custom fallback: CHANGE_KINDS = LEVER_KINDS +
(custom,). strategy normalizes any unspecified/unknown kind to forward_patch (lowest
risk); apply normalizes stale/unknown values (e.g. an old "kvcache") to custom. All
three consumers — strategy, apply, ledger attribution — import this one constant rather
than hardcoding strings. kvcache/quantize/config are explicitly sub-cases of
loading_time; parallelism is out of scope on a single-card NPU."""
consequences = """
### Positive
- Adding or renaming a lever is a one-line change in models.py.
- By-lever attribution (strategy_kind vs applied_kind) stays meaningful.
- Dirty kind strings never reach manifests or the ledger.

### Negative
- The taxonomy is opinionated; a genuinely novel optimization that fits no lever lands
  in custom and loses by-lever attribution granularity.
- The Python constant and the prose docs (CLAUDE.md, optimization_api.md, skill files)
  must be kept aligned by hand.

### Neutral
- The doc-side alignment is manual today; a future check could assert the docs match
  LEVER_KINDS."""

[[content.alternatives]]
text = "Chosen: a single canonical enum LEVER_KINDS = (forward_patch, operator_fusion, graph_rewrite, loading_time) in models.py as the single source of truth, mapped to the four build_model change layers. apply's legal set is CHANGE_KINDS = LEVER_KINDS + (custom,) as a fallback. strategy normalizes unknown values to forward_patch (narrowest); apply normalizes unknown/stale values to custom. kvcache/quantize/config are sub-cases of loading_time; parallelism is excluded (single-card NPU)."
status = "accepted"
pros = [
    "One place to add/rename a lever; all three modules import the same constant",
    "Stale/unknown kinds are normalized rather than leaking dirty strings into manifests and the ledger",
    "Clear taxonomy: four layers of build_model, not an open-ended grab-bag",
]

[[content.alternatives]]
text = "Rejected: let each module use free-form kind strings as needed."
status = "rejected"
cons = [
    "Vocabulary drifts across modules",
    "By-lever attribution (strategy-wanted vs apply-applied) becomes unreconcilable",
]
rejection_reason = "Free-form strings make the cross-module attribution meaningless; a shared closed vocabulary is the whole point."
