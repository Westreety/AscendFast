#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0008"
title = "Apply runtime forward gate and no-silent-fallback for LLM agents"
status = "accepted"
date = "2026-06-14"
refs = ["ADR-0007"]

[content]
context = """
Two distinct trust problems with agent-driven stages:

(1) An apply-agent reports "I changed it and it builds", but NPU fused/custom-op
parameter errors (dtype/shape/layout) only surface at forward time — construction
passes, the forward crashes. Accepting such a ChangeRecord would let a broken mode into
correctness (leaving correctness_passed=null) and recurse into a dead branch.

(2) The analysis and strategy stages call an LLM agent. If the agent runtime is disabled
or fails, silently degrading to empty findings / an empty strategy list would make the
run quietly do nothing while looking like it ran — a degradation that hides itself.

This ADR records the chosen state, reconstructed from apply.py:108-152,
analysis.py:268-289, and strategy.py:18-26."""
decision = """
Two guards keep agent-driven stages honest:

1. Apply runtime forward gate (apply._workspace_forward_ok): before a ChangeRecord is
   accepted, apply imports the forked workspace through the single loader, builds the
   model, and runs one no_grad forward on a tiny prompt. NPU fused/custom-op parameter
   errors (dtype/shape/layout) only surface at forward time; if the forward throws, the
   record is set to None, so gate_apply ([[ADR-0007]]) judges the apply produced no new
   ChangeRecord and the pipeline neither enters correctness nor recurses into the broken
   mode. The gate swallows ALL exceptions itself (it must never crash apply), prints the
   cause, and releases the probe model so it does not double-occupy NPU memory.

2. No silent fallback for LLM stages: analyze_profile and generate_optimization_strategies
   RAISE when AGENT_ENABLED is false or the agent call fails, instead of degrading to
   empty findings / an empty strategy list. A degraded run must be visible, not disguised
   as "nothing to optimize"."""
consequences = """
### Positive
- Forward-only op errors are caught before they corrupt correctness state or recursion.
- Agent-runtime failures fail loudly and are attributable.
- The probe model is released, avoiding two models resident in NPU memory at once.

### Negative
- Every apply pays the cost of an extra forward probe.
- A flaky agent runtime turns into a hard run failure rather than a partial result.

### Neutral
- The forward gate complements the offline gates in [[ADR-0007]]: gate_apply is the pure
  check, the forward probe is the runtime check that feeds it."""

[[content.alternatives]]
text = "Chosen: (1) apply runs a real forward gate before accepting a ChangeRecord — it imports the forked workspace via the single loader, builds the model, and runs one no_grad forward on a tiny prompt; if anything throws (including NPU op errors) the record is discarded so gate_apply judges the apply ineffective and does not recurse. The gate swallows all exceptions itself (it must never crash apply) and prints the cause. (2) analysis/strategy RAISE when AGENT_ENABLED is false or the agent fails, rather than returning empty results — the failure is visible, not silently degraded."
status = "accepted"
pros = [
    "Catches errors that only appear at forward time, before they poison correctness or recursion",
    "Agent-runtime failures surface loudly instead of masquerading as 'no optimizations found'",
    "The forward gate is self-contained and releases its probe model to avoid double-occupying NPU memory",
]

[[content.alternatives]]
text = "Rejected: trust the agent's self-report (construction-only check) and silently fall back to empty results when the agent is unavailable."
status = "rejected"
cons = [
    "Forward-time op errors slip through into correctness and recursion",
    "A disabled/failed agent makes the run silently do nothing",
]
rejection_reason = "Both are self-hiding failures; an actual forward probe and a loud raise are what keep the pipeline honest about what did and didn't work."
